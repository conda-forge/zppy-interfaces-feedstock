schema_version: 1

context:
  name: zppy-interfaces
  version: "0.2.0"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/E3SM-Project/zppy-interfaces/archive/v${{ version }}.tar.gz
  sha256: 77bb58eafa5b4411673e385f369d8628ec49bad99b4f59d56390ea5c0766266b

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  # Build from https://github.com/E3SM-Project/zppy-interfaces/blob/v{{ version }}/conda/dev.yml
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=60
  run:
    - python >=${{ python_min }},<3.14
    - beautifulsoup4
    - lxml
    - matplotlib-base >=3.8.2
    - mpas_tools >=0.21.0
    - netcdf4
    - numpy >=2.0,<3.0
    - output_viewer ==1.3.3
    - pcmdi_metrics >=3.9.3
    - xarray >=2023.02.0
    - xcdat >=0.7.3,<1.0

tests:
  - python:
      imports:
        - zppy_interfaces
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - zi-global-time-series --help

about:
  summary: Interfaces between external tools and zppy, E3SM post-processing toolchain
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/E3SM-Project/zppy-interfaces

extra:
  recipe-maintainers:
    - andrewdnolan
    - mahf708
    - xylar
    - tomvothecoder
    - forsyth2
    - chengzhuzhang
