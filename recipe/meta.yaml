{% set name = "zppy-interfaces" %}
{% set version = "0.2.0rc1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/E3SM-Project/zppy-interfaces/archive/v{{ version }}.tar.gz
  sha256: 82baaf5c5c1e69e3fc305d21c1f5c6b4d0b2c782cff6c8579a8a5c0b48fdf604

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  noarch: python

requirements:
  # Build from https://github.com/E3SM-Project/zppy-interfaces/blob/v{{ version }}/conda/dev.yml
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=60
  # Base from https://github.com/E3SM-Project/zppy-interfaces/blob/v{{ version }}/conda/dev.yml
  run:
    - python >={{ python_min }}
    - beautifulsoup4
    - lxml
    - matplotlib-base
    - mpas_tools
    - netcdf4
    - numpy >=2.0,<3.0
    - output_viewer ==1.3.3
    - pcmdi_metrics >=3.9.3
    - xarray >=2023.02.0
    - xcdat >=0.7.3,<1.0

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - zppy_interfaces
  commands:
    - zi-global-time-series --help
    - pip check

about:
  home: https://github.com/E3SM-Project/zppy-interfaces
  summary: Interfaces between external tools and zppy, E3SM post-processing toolchain
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mahf708
    - xylar
    - tomvothecoder
    - forsyth2
    - chengzhuzhang
